name: Weekly Pre-Order Report

on:
  schedule:
    # Every Monday at 8:00 AM Eastern (12:00 UTC standard, 13:00 UTC during DST)
    # Using 12:00 UTC — adjust to 13:00 during Eastern Daylight Time if needed
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Restore last-run timestamp from cache
      - uses: actions/cache@v4
        with:
          path: last-run.json
          key: last-run-${{ github.run_id }}
          restore-keys: last-run-

      - run: npm ci
      - run: npm run build
      - run: node dist/index.js
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LAST_RUN_STORAGE: file
